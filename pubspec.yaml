name: edu_connect
description: "A campus connectivity app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  very_good_analysis: ^5.1.0

  # * Network *
  dio: ^5.4.1 
  retrofit: ^4.1.0 
  http_parser: ^4.0.2 
  pretty_dio_logger: ^1.3.1 
  connectivity_plus: ^5.0.2 
  dio_smart_retry: ^6.0.0

  # * State Management *
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # * Route Management *
  go_router: 16.1.0

  # * Functional Programming *
  fpdart: ^1.1.0

  # * Firebase *
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.5
  firebase_analytics: ^11.4.5 
  firebase_performance: ^0.10.1
  firebase_messaging: ^15.2.5

  # * Local Storage *
  flutter_secure_storage: ^9.0.0

  # * Toast, Alerts, Notifications *
  bot_toast: ^4.1.3

  # * Code-gen *
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # * Launchers *
  url_launcher: ^6.3.1 
  url_strategy: ^0.2.0 

  # * Loading *
  loading_animation_widget: ^1.2.1
  flutter_easyloading: ^3.0.5
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0

  # * Location *
  geocoding: ^3.0.0
  timezone: ^0.9.2

  # * Utils *
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.2.0
  device_preview: ^1.2.0

  # * Device & Package *
  package_info_plus: ^8.3.0
  path: ^1.8.3
  path_provider: ^2.1.2


  # * Animations *
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # * Extra Widgets *
  table_calendar: ^3.1.2 
  pinput: ^3.0.1 
  share_plus: ^7.2.1 
  animated_text_kit: ^4.2.2 
  flutter_rating_stars: ^1.0.3+4
  carousel_slider: 4.2.0
  cached_network_image: ^3.3.1
  country_picker: ^2.0.25
  liquid_pull_to_refresh: ^3.0.1
  dotted_border: ^2.1.0
  flutter_svg: ^2.0.17

  image_picker: ^1.1.2
  file_picker: ^10.1.9
  photo_view: ^0.15.0
  flutter_remix: ^0.0.3
  flutter_image_compress: ^2.0.4
  flutter_typeahead: ^5.2.0

  # * TESTING *
  mocktail: ^1.0.3
  logger: ^2.2.0
  timeago: ^3.7.0
  fl_chart: ^0.71.0
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Code generation ---
  build_runner: ^2.4.8
  go_router_builder: ^3.0.1
  riverpod_generator: ^2.4.0 
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  flutter_gen_runner: ^5.9.0
  flutter_launcher_icons: ^0.13.1

flutter_gen:
  output: lib/gen/
  line_length: 120

  integrations:
    flutter_svg: true

  colors:
    inputs:
      - assets/color/colors.xml

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo-1.jpg"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Thin.ttf
        - asset: assets/fonts/Poppins/Poppins-ThinItalic.ttf
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins/Poppins-SemiBoldItalic.ttf
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins/Poppins-MediumItalic.ttf
        - asset: assets/fonts/Poppins/Poppins-Light.ttf
        - asset: assets/fonts/Poppins/Poppins-LightItalic.ttf
        - asset: assets/fonts/Poppins/Poppins-ExtraLight.ttf
        - asset: assets/fonts/Poppins/Poppins-ExtraBold.ttf
        - asset: assets/fonts/Poppins/Poppins-ExtraLightItalic.ttf
        - asset: assets/fonts/Poppins/Poppins-Black.ttf
        - asset: assets/fonts/Poppins/Poppins-BoldItalic.ttf

    - family: Oleo_Script
      fonts:
        - asset: assets/fonts/Oleo_Script/OleoScript-Regular.ttf
        - asset: assets/fonts/Oleo_Script/OleoScript-Bold.ttf

    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald/Oswald-Light.ttf
        - asset: assets/fonts/Oswald/Oswald-Medium.ttf
        - asset: assets/fonts/Oswald/Oswald-SemiBold.ttf
        - asset: assets/fonts/Oswald/Oswald-Bold.ttf
